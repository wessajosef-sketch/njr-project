<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Not Just Recycling - Ultimate Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f9fafb;
        }

        .reward-card:hover {
            transform: translateY(-3px);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: #10b981;
            border-radius: 10px;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(4px);
        }

        .modal.active {
            display: flex;
        }

        .custom-scroll::-webkit-scrollbar {
            width: 4px;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>

<body class="p-4 md:p-10">

    <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4 text-left">
        <div>
            <h1 class="text-3xl font-extrabold text-gray-800">
                Welcome back, <span id="dynamicUserName" class="text-emerald-600 italic">Hero</span>! 👋
            </h1>
            <p class="text-gray-500 mt-1">Your impact with <strong class="text-emerald-700">Not Just Recycling</strong>
                matters.</p>
        </div>
        <div class="bg-emerald-600 text-white px-6 py-3 rounded-2xl font-bold shadow-lg flex items-center gap-3">
            <i class="fas fa-coins text-yellow-300"></i>
            <span><span id="userPoints">50000</span> Points Available</span>
        </div>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10 text-left">
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-emerald-100 flex items-center gap-5">
            <div class="bg-emerald-100 p-4 rounded-2xl text-emerald-600"><i class="fas fa-recycle text-3xl"></i></div>
            <div>
                <p class="text-gray-400 text-sm">Total Recycled</p>
                <h3 class="text-2xl font-black text-gray-700">450 kg</h3>
            </div>
        </div>
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-blue-100 flex items-center gap-5">
            <div class="bg-blue-100 p-4 rounded-2xl text-blue-600"><i class="fas fa-seedling text-3xl"></i></div>
            <div>
                <p class="text-gray-400 text-sm">CO2 Saved</p>
                <h3 class="text-2xl font-black text-gray-700">120 kg</h3>
            </div>
        </div>
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-orange-100 flex items-center gap-5">
            <div class="bg-orange-100 p-4 rounded-2xl text-orange-600"><i class="fas fa-truck-loading text-3xl"></i>
            </div>
            <div>
                <p class="text-gray-400 text-sm">Pickups Done</p>
                <h3 class="text-2xl font-black text-gray-700">12 Orders</h3>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="lg:col-span-2 bg-white p-8 rounded-3xl shadow-sm border border-gray-100 text-left">
            <h3 class="text-xl font-bold mb-6 flex items-center gap-2 text-gray-800">
                <i class="fas fa-chart-line text-emerald-500"></i> Points History
            </h3>
            <div class="h-[400px]">
                <canvas id="recyclingChart"></canvas>
            </div>
        </div>

        <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-100">
            <h3 class="text-xl font-bold mb-6 text-gray-800 border-b pb-4 text-left">Available Rewards</h3>
            <div id="rewardsList" class="space-y-4 max-h-[600px] overflow-y-auto pr-2 custom-scroll"></div>
        </div>
    </div>

    <div id="productModal" class="modal">
        <div class="bg-white p-6 rounded-3xl max-w-md w-full mx-4 relative text-left shadow-2xl">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600"><i
                    class="fas fa-times-circle text-2xl"></i></button>
            <h2 id="modalBrandName" class="text-2xl font-bold mb-4">Brand</h2>
            <div id="productList" class="space-y-3 max-h-[450px] overflow-y-auto pr-2 custom-scroll"></div>
        </div>
    </div>

    <script>
        const userName = localStorage.getItem("registeredName");
        document.getElementById("dynamicUserName").innerText = userName;

        const rewardsData = [
            { name: "Nike", color: "bg-zinc-900", products: Array(10).fill().map((_, i) => ({ n: `Nike Item ${i + 1}`, p: 500 + (i * 200), img: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=100" })) },
            { name: "H&M", color: "bg-red-700", products: Array(10).fill().map((_, i) => ({ n: `H&M Item ${i + 1}`, p: 400 + (i * 150), img: "https://images.unsplash.com/photo-1543085337-33fa5909c731?w=100" })) },
            { name: "Seoudi Market", color: "bg-green-700", products: Array(10).fill().map((_, i) => ({ n: `Seoudi Voucher ${i + 1}`, p: 1000 + (i * 500), img: "https://images.unsplash.com/photo-1542838132-92c53300491e?w=100" })) },
            { name: "IKEA", color: "bg-blue-700", products: Array(10).fill().map((_, i) => ({ n: `IKEA Home ${i + 1}`, p: 300 + (i * 250), img: "https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=100" })) },
            { name: "Buffalo Burger", color: "bg-orange-800", products: Array(10).fill().map((_, i) => ({ n: `Buffalo Meal ${i + 1}`, p: 800 + (i * 200), img: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=100" })) },
            { name: "Bazooka", color: "bg-yellow-500", products: Array(10).fill().map((_, i) => ({ n: `Bazooka Box ${i + 1}`, p: 700 + (i * 300), img: "https://images.unsplash.com/photo-1562967914-608f82629710?w=100" })) },
            { name: "LC Waikiki", color: "bg-blue-800", products: Array(10).fill().map((_, i) => ({ n: `LC Item ${i + 1}`, p: 600 + (i * 200), img: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=100" })) },
            { name: "Amazon", color: "bg-orange-500", products: Array(10).fill().map((_, i) => ({ n: `Amazon Credit ${i + 1}`, p: 500 + (i * 500), img: "https://images.unsplash.com/photo-1523475496153-3d6cc0f0bf19?w=100" })) },
            { name: "Starbucks", color: "bg-emerald-900", products: Array(10).fill().map((_, i) => ({ n: `Starbucks Drink ${i + 1}`, p: 400 + (i * 100), img: "https://images.unsplash.com/photo-1517701604599-bb29b565090c?w=100" })) },
            { name: "Adidas", color: "bg-black", products: Array(10).fill().map((_, i) => ({ n: `Adidas Item ${i + 1}`, p: 900 + (i * 400), img: "https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=100" })) },
            { name: "McDonald's", color: "bg-red-600", products: Array(10).fill().map((_, i) => ({ n: `McD Meal ${i + 1}`, p: 600 + (i * 200), img: "https://images.unsplash.com/photo-1561758033-d89a9ad46330?w=100" })) }
        ];

        const rewardsList = document.getElementById("rewardsList");
        rewardsData.forEach((item, index) => {
            rewardsList.innerHTML += `
                <div onclick="openModal(${index})" class="reward-card flex items-center justify-between p-4 border rounded-2xl hover:bg-emerald-50 transition duration-300 shadow-sm border-gray-100 text-left">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 ${item.color} text-white rounded-xl flex items-center justify-center text-[10px] font-bold uppercase">${item.name.substring(0, 3)}</div>
                        <div><p class="font-bold text-gray-800 text-sm">${item.name}</p><p class="text-xs text-emerald-600 font-semibold">${item.products.length} Offers</p></div>
                    </div>
                    <button class="bg-gray-100 text-gray-600 px-4 py-2 rounded-xl text-xs font-bold hover:bg-emerald-600 hover:text-white transition">View</button>
                </div>`;
        });

        function openModal(index) {
            const brand = rewardsData[index];
            document.getElementById('modalBrandName').innerText = brand.name;
            const list = document.getElementById('productList');
            list.innerHTML = "";
            brand.products.forEach(p => {
                list.innerHTML += `
                    <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-2xl border border-transparent hover:border-emerald-200 transition-all">
                        <img src="${p.img}" class="w-14 h-14 rounded-xl object-cover shadow-sm">
                        <div class="flex-1"><p class="font-bold text-[13px] text-gray-800">${p.n}</p><p class="text-emerald-600 font-bold text-[11px]">${p.p} pts</p></div>
                        <button onclick="redeem('${p.n}', ${p.p})" class="bg-emerald-600 text-white px-3 py-2 rounded-xl text-[10px] font-bold shadow-sm">Redeem</button>
                    </div>`;
            });
            document.getElementById('productModal').classList.add('active');
        }

        function closeModal() { document.getElementById('productModal').classList.remove('active'); }
        function redeem(name, cost) {
            let ptsElement = document.getElementById("userPoints");
            let currentPoints = parseInt(ptsElement.innerText);

            if (currentPoints >= cost) {
                // 1. خصم النقاط وتحديث الواجهة
                ptsElement.innerText = currentPoints - cost;

                // 2. إطلاق الزينة (Confetti)
                var duration = 3 * 1000;
                var end = Date.now() + duration;

                (function frame() {
                    confetti({
                        particleCount: 7,
                        angle: 60,
                        spread: 55,
                        origin: { x: 0 },
                        colors: ['#10b981', '#fbbf24', '#3b82f6']
                    });
                    confetti({
                        particleCount: 7,
                        angle: 120,
                        spread: 55,
                        origin: { x: 1 },
                        colors: ['#10b981', '#fbbf24', '#3b82f6']
                    });

                    if (Date.now() < end) {
                        requestAnimationFrame(frame);
                    }
                }());

                // 3. رسالة النجاح
                setTimeout(() => {
                    alert(`🎉 CONGRATULATIONS! 🎉\n\nYour reward for "${name}" is ready!`);
                    closeModal();
                }, 500);

            } else {
                alert("Oops! Not enough points for this reward.");
            }
        }

        const ctx = document.getElementById('recyclingChart').getContext('2d');
        new Chart(ctx, { type: 'line', data: { labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'], datasets: [{ data: [300, 450, 380, 800, 600, 950], borderColor: '#10b981', borderWidth: 4, pointBackgroundColor: '#ffffff', pointBorderColor: '#10b981', pointRadius: 6, fill: true, backgroundColor: 'rgba(16, 185, 129, 0.05)', tension: 0.4 }] }, options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { borderDash: [5, 5] } }, x: { grid: { display: false } } } } });



        function redeem(name, cost) {
            let pts = document.getElementById("userPoints");
            let currentPts = parseInt(pts.innerText);

            if (currentPts >= cost) {
                // 1. خصم النقاط
                pts.innerText = currentPts - cost;

                // 2. إغلاق مودال المنتجات
                closeModal();

                // 3. إظهار مودال النجاح وتحديث الاسم
                document.getElementById('rewardNameDisplay').innerText = name;
                document.getElementById('successModal').classList.add('active');

                // 4. إطلاق الزينة (Confetti)
                fireConfetti();
            } else {
                alert("Not enough points!");
            }
        }

        function closeSuccessModal() {
            document.getElementById('successModal').classList.remove('active');
        }

        function fireConfetti() {
            var count = 200;
            var defaults = { origin: { y: 0.7 } };

            function fire(particleRatio, opts) {
                confetti({
                    ...defaults,
                    ...opts,
                    particleCount: Math.floor(count * particleRatio)
                });
            }

            fire(0.25, { spread: 26, startVelocity: 55 });
            fire(0.2, { spread: 60 });
            fire(0.35, { spread: 100, decay: 0.91, scalar: 0.8 });
            fire(0.1, { spread: 120, startVelocity: 25, decay: 0.92, scalar: 1.2 });
            fire(0.1, { spread: 120, startVelocity: 45 });
        }
    </script>

    <div id="successModal" class="modal">
        <div class="bg-white p-10 rounded-[40px] max-w-sm w-full mx-4 text-center shadow-2xl border border-emerald-50">
            <div
                class="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-check-circle text-5xl"></i>
            </div>
            <h2 class="text-3xl font-black text-gray-800 mb-2">CONGRATS!</h2>
            <p class="text-gray-500 mb-8 leading-relaxed">
                Success! Your reward for <span id="rewardNameDisplay" class="font-bold text-emerald-600"></span> is
                ready.
            </p>
            <button onclick="closeSuccessModal()"
                class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold shadow-lg hover:bg-emerald-700 transition-all active:scale-95">
                Awesome! 🚀
            </button>
        </div>
    </div>


    <style>
        /* تصميم نافذة النجاح */
        #successModal.active {
            display: flex;
            animation: bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes bounceIn {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</body>

</html>
